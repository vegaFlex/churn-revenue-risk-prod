<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Language" content="en">
    <meta name="google" content="notranslate">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body class="notranslate">
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-brand">
                <p class="eyebrow">Revenue Risk Platform</p>
                <h1>Command Center</h1>
                <p class="brand-copy">Churn intelligence, revenue exposure analytics, monitoring, and browser-based decision support.</p>
            </div>
            <div class="topbar-actions">
                <a href="/upload" class="action-button">Upload Dataset</a>
                <a href="/docs" class="action-button action-button-secondary">API Docs</a>
            </div>
        </header>
        <nav class="topnav">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Overview</a>
            <a href="/customers" class="nav-link {% if request.url.path.startswith('/customers') %}active{% endif %}">Customers</a>
            <a href="/monitoring" class="nav-link {% if request.url.path.startswith('/monitoring') %}active{% endif %}">Monitoring</a>
            <a href="/upload" class="nav-link {% if request.url.path.startswith('/upload') %}active{% endif %}">Upload</a>
            <a href="/docs/guide/" class="nav-link {% if request.url.path.startswith('/docs/guide') or request.url.path.startswith('/docs/user-guide') or request.url.path.startswith('/docs/manual-testing-guide') or request.url.path.startswith('/docs/buyer-guide') %}active{% endif %}">Guides</a>
            <a href="/docs" class="nav-link">API Docs</a>
            <a href="/health" class="nav-link">Health</a>
        </nav>
        <main class="main-panel">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        window.__TREND_POINTS__ = {{ (trend_points | default([], true)) | tojson }};
    </script>
    <script src="{{ url_for('static', path='/js/dashboard.js') }}"></script>
</body>
</html>
